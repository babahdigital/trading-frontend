name: Docker Publish + Deploy

# Build amd64 image (VPS3 = amd64) → push ke Docker Hub → trigger deploy ke VPS3.
# Trigger:
#   - push ke main (tag: latest, sha-<short>, dan branch=main)
#   - push tag v* (tag: latest, v1.2.3, semver)
#   - workflow_dispatch (manual)
#
# Required GitHub secrets:
#   DOCKER_USERNAME       — Docker Hub login (sama dengan project lain di org)
#   DOCKER_PASSWORD       — Docker Hub access token (PAT, bukan password akun)
#   VPS3_SSH_HOST         — 148.230.96.201
#   VPS3_SSH_PORT         — 1983
#   VPS3_SSH_USER         — abdullah
#   VPS3_SSH_KEY          — private key (id_raspi_ed25519 content, full PEM)
#   VPS3_DEPLOY_PATH      — /opt/trading-commercial

env:
  DOCKER_BUILDKIT: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: babahdigital/babahalgo-frontend

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: "Skip auto-deploy ke VPS3 (image tetap di-publish)"
        type: boolean
        required: false
        default: false
      cleanup_cache:
        description: "Bersihkan build cache GHA sebelum build (lambat tapi reproducible)"
        type: boolean
        required: false
        default: false

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------
  # JOB 1 — Build & push multi-arch image
  # -------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validasi Secret Docker Hub
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::DOCKER_USERNAME secret tidak tersedia"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_PASSWORD secret tidak tersedia"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=BabahAlgo Frontend
            org.opencontainers.image.description=Institutional trading platform commerce frontend (Next.js)
            org.opencontainers.image.vendor=Babah Digital
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build & push (amd64 only — match VPS3 arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=babahalgo
          cache-to: type=gha,mode=max,scope=babahalgo${{ inputs.cleanup_cache == true && ',ignore-error=true' || '' }}

      - name: Image summary
        run: |
          {
            echo "### Image Published"
            echo "- Image: \`${{ env.IMAGE_NAME }}\`"
            echo "- Primary tag: \`${{ steps.meta.outputs.version }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Platforms: linux/amd64, linux/arm64"
            echo ""
            echo "**All tags pushed:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # -------------------------------------------------------------
  # JOB 2 — Deploy ke VPS3:
  #   1. Sync compose files
  #   2. Bootstrap folder structure (data/, public/, scratch/)
  #   3. Pull image + zero-downtime restart + healthcheck
  #   4. Cleanup source code (idempotent — VPS3 cuma punya compose+mounts)
  # -------------------------------------------------------------
  deploy:
    needs: build-and-push
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && inputs.skip_deploy != true }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS3_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VPS3_SSH_PORT }} -H ${{ secrets.VPS3_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose files to VPS3
        env:
          SSH_PORT: ${{ secrets.VPS3_SSH_PORT }}
          SSH_USER: ${{ secrets.VPS3_SSH_USER }}
          SSH_HOST: ${{ secrets.VPS3_SSH_HOST }}
          DEPLOY_PATH: ${{ secrets.VPS3_DEPLOY_PATH }}
        run: |
          scp -i ~/.ssh/deploy_key -P "$SSH_PORT" \
            docker-compose.prod.yml docker-compose.db.yml \
            "$SSH_USER@$SSH_HOST:$DEPLOY_PATH/"

      - name: Bootstrap folder structure + public assets
        env:
          SSH_HOST: ${{ secrets.VPS3_SSH_HOST }}
          SSH_PORT: ${{ secrets.VPS3_SSH_PORT }}
          SSH_USER: ${{ secrets.VPS3_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS3_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            DEPLOY_PATH="$DEPLOY_PATH" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          echo "== bootstrap folders =="
          mkdir -p data/backups/daily data/backups/weekly data/backups/monthly
          mkdir -p public scratch
          chmod 750 data/backups

          # First-time bootstrap public/ from image (cuma kalau folder kosong)
          if [ -z "$(ls -A public 2>/dev/null)" ]; then
            echo "== bootstrap public/ from image =="
            docker pull babahdigital/babahalgo-frontend:latest
            docker run --rm -v "$(pwd)/public:/dest" babahdigital/babahalgo-frontend:latest \
              sh -c 'cp -r /app/public/. /dest/ 2>/dev/null && chown -R 1001:1001 /dest 2>/dev/null || true'
            echo "public/ bootstrapped: $(ls public | wc -l) entries"
          fi
          REMOTE

      - name: Pull image + zero-downtime restart
        env:
          SSH_HOST: ${{ secrets.VPS3_SSH_HOST }}
          SSH_PORT: ${{ secrets.VPS3_SSH_PORT }}
          SSH_USER: ${{ secrets.VPS3_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS3_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            DEPLOY_PATH="$DEPLOY_PATH" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          # Stop legacy stack (build-based docker-compose.yml) if running
          if [ -f docker-compose.yml ] && docker compose -f docker-compose.yml ps -q 2>/dev/null | grep -q .; then
            echo "== stopping legacy build-based stack =="
            docker compose -f docker-compose.yml down --remove-orphans || true
          fi

          echo "== docker compose pull =="
          docker compose -f docker-compose.prod.yml pull

          echo "== docker compose up -d =="
          docker compose -f docker-compose.prod.yml up -d --force-recreate

          echo "== healthcheck poll =="
          for i in $(seq 1 15); do
            STATUS=$(docker inspect --format '{{.State.Health.Status}}' trading-commercial-app-1 2>/dev/null || echo 'starting')
            echo "attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              echo "container healthy ✓"
              break
            fi
            if [ "$i" = "15" ]; then
              echo "::error::Container failed to become healthy within 90s"
              docker compose -f docker-compose.prod.yml logs app --tail=80
              exit 1
            fi
            sleep 6
          done
          REMOTE

      - name: Cleanup source code (whitelist-only)
        env:
          SSH_HOST: ${{ secrets.VPS3_SSH_HOST }}
          SSH_PORT: ${{ secrets.VPS3_SSH_PORT }}
          SSH_USER: ${{ secrets.VPS3_SSH_USER }}
          DEPLOY_PATH: ${{ secrets.VPS3_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" -o BatchMode=yes "$SSH_USER@$SSH_HOST" \
            DEPLOY_PATH="$DEPLOY_PATH" 'bash -s' <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          # Whitelist: hanya file/folder ini yang TIDAK dihapus
          KEEP_PATTERN='^(docker-compose\.prod\.yml|docker-compose\.db\.yml|\.env|\.env\.example|data|public|scratch|\.docker)$'

          echo "== state SEBELUM cleanup =="
          ls -A | head -30

          # List entries yang BUKAN di whitelist + bukan dotfile penting
          echo "== entries to delete =="
          ls -A | grep -vE "$KEEP_PATTERN" | grep -vE '^\.env\.bak-' || true

          # Delete everything not in whitelist (kecuali .env.bak-* yang separate handling)
          ls -A | grep -vE "$KEEP_PATTERN" | grep -vE '^\.env\.bak-' | while read item; do
            if [ -e "$item" ]; then
              echo "  rm -rf $item"
              rm -rf "$item"
            fi
          done

          # Hapus juga .env.bak lama (lebih dari 30 hari, keep recent backup)
          find . -maxdepth 1 -name '.env.bak-*' -mtime +30 -delete 2>/dev/null || true

          echo "== state SETELAH cleanup =="
          ls -A
          du -sh . 2>/dev/null | head -1
          REMOTE

      - name: Public smoke test
        run: |
          set -e
          echo "== /api/health =="
          curl -fsS https://babahalgo.com/api/health -o /dev/null -w "HTTP %{http_code}\n"
          echo "== /api/public/capabilities =="
          curl -fsS https://babahalgo.com/api/public/capabilities | head -c 200
          echo ""
          echo "== /pricing =="
          curl -fsS https://babahalgo.com/pricing -o /dev/null -w "HTTP %{http_code}\n"

      - name: Deploy summary
        if: success()
        run: |
          {
            echo "### Deploy Successful"
            echo "- Target: VPS3 (${{ secrets.VPS3_SSH_HOST }})"
            echo "- Image tag: \`${{ needs.build-and-push.outputs.image_tag }}\`"
            echo "- Production URL: https://babahalgo.com"
            echo "- Healthcheck: passed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
