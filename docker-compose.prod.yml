# ============================================================
# Production compose — VPS3 (148.230.96.201)
# ============================================================
# Tidak ada `build:` — image di-pull dari Docker Hub.
# Source code TIDAK perlu ada di /opt/trading-commercial.
#
# Folder structure di VPS3:
#   /opt/trading-commercial/
#   ├── docker-compose.prod.yml   # this file
#   ├── docker-compose.db.yml     # OPTIONAL: postgres-in-docker
#   ├── .env                       # secrets
#   ├── data/
#   │   ├── postgres/              # postgres data (kalau pakai docker postgres)
#   │   └── backups/               # nightly pg_dump output
#   ├── public/                    # branding/CMS images (hot-swap tanpa rebuild)
#   └── scratch/                   # one-off test/maintenance scripts
#
# Update flow (otomatis via GitHub Actions):
#   docker compose -f docker-compose.prod.yml pull app
#   docker compose -f docker-compose.prod.yml up -d --force-recreate app
#
# One-time bootstrap (untuk first-time deploy public/ folder):
#   docker run --rm -v $(pwd)/public:/dest babahdigital/babahalgo-frontend \
#     sh -c 'cp -r /app/public/. /dest/'
# ============================================================

services:
  app:
    image: babahdigital/babahalgo-frontend:${IMAGE_TAG:-latest}
    container_name: trading-commercial-app-1
    restart: unless-stopped
    pull_policy: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Database (default: host Postgres via host.docker.internal)
      # Override DB_HOST=postgres untuk pakai docker-compose.db.yml
      - DATABASE_URL=postgresql://trading_user:${DB_PASSWORD}@${DB_HOST:-host.docker.internal}:${DB_PORT:-5432}/trading_commercial?schema=public

      # Auth
      - JWT_SECRET=${JWT_SECRET}
      - LICENSE_MW_MASTER_KEY=${LICENSE_MW_MASTER_KEY:?LICENSE_MW_MASTER_KEY must be set}

      # Backend proxy
      - VPS1_BACKEND_URL=${VPS1_BACKEND_URL:?VPS1_BACKEND_URL must be set}
      - VPS1_ADMIN_TOKEN=${VPS1_ADMIN_TOKEN:-}
      - VPS1_TOKEN_SIGNALS=${VPS1_TOKEN_SIGNALS:-}
      - VPS1_TOKEN_TRADE_EVENTS=${VPS1_TOKEN_TRADE_EVENTS:-}
      - VPS1_TOKEN_RESEARCH=${VPS1_TOKEN_RESEARCH:-}
      - VPS1_TOKEN_PAMM=${VPS1_TOKEN_PAMM:-}
      - VPS1_TOKEN_STATS=${VPS1_TOKEN_STATS:-}

      # Cron + workers
      - CRON_SECRET=${CRON_SECRET:-}
      - ENABLE_SIGNAL_CONSUMER=${ENABLE_SIGNAL_CONSUMER:-false}
      - ENABLE_TRADE_EVENTS_CONSUMER=${ENABLE_TRADE_EVENTS_CONSUMER:-false}
      - ENABLE_RESEARCH_INGESTER=${ENABLE_RESEARCH_INGESTER:-false}
      - ENABLE_PAIR_BRIEF_WORKER=${ENABLE_PAIR_BRIEF_WORKER:-false}

      # AI
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}

      # Admin bootstrap
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}

      # Runtime
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://babahalgo.com}

      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}

      # Email (Brevo)
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - SMTP_FROM=${SMTP_FROM:-BabahAlgo <no-reply@babahalgo.com>}

      # Payment
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY:-}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY:-}
      - XENDIT_SECRET_KEY=${XENDIT_SECRET_KEY:-}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN:-}

      # Observability
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ORG=${SENTRY_ORG:-}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-}

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Public assets (logos, CMS-uploaded images, default branding) — hot-swap tanpa rebuild image
      - ./public:/app/public
      # Scratch space untuk one-off test/maintenance script (read-only di container)
      - ./scratch:/app/scratch:ro

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  # ============================================================
  # Nightly DB backup → ./data/backups/
  # ============================================================
  # Runs pg_dump every day at 02:00 Asia/Jakarta.
  # Retention: 7 daily + 4 weekly + 12 monthly.
  # Logic inline di sini — tidak butuh script eksternal di VPS3.
  #
  # Manual one-off backup:
  #   docker compose -f docker-compose.prod.yml exec db-backup /usr/local/bin/do-backup.sh
  # Restore (TARGET: trading_commercial database, hati-hati):
  #   gunzip -c data/backups/<file>.sql.gz | docker compose exec -T db-backup psql -d trading_commercial
  db-backup:
    image: postgres:16-alpine
    container_name: trading-commercial-db-backup
    restart: unless-stopped
    environment:
      - PGHOST=${DB_HOST:-host.docker.internal}
      - PGPORT=${DB_PORT:-5432}
      - PGDATABASE=trading_commercial
      - PGUSER=${DB_BACKUP_USER:-trading_user}
      - PGPASSWORD=${DB_PASSWORD}
      - TZ=Asia/Jakarta
      - BACKUP_HOUR=${BACKUP_HOUR:-2}
      - BACKUP_RETENTION_DAILY=${BACKUP_RETENTION_DAILY:-7}
      - BACKUP_RETENTION_WEEKLY=${BACKUP_RETENTION_WEEKLY:-4}
      - BACKUP_RETENTION_MONTHLY=${BACKUP_RETENTION_MONTHLY:-12}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/backups:/backups
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        apk add --no-cache tzdata findutils >/dev/null
        cp -f /usr/share/zoneinfo/Asia/Jakarta /etc/localtime || true

        # ============ do-backup.sh (inline) ============
        # NOTE: $$ di YAML compose escape jadi $ — semua var-interpretation
        # akan dihandle di runtime container, bukan di compose config-time.
        cat > /usr/local/bin/do-backup.sh <<'BACKUP'
        #!/bin/sh
        set -eu
        TS=$$(date +%Y%m%d-%H%M%S)
        DOW=$$(date +%u)
        DOM=$$(date +%d)
        OUT="/backups/daily/trading_commercial-$${TS}.sql.gz"
        mkdir -p /backups/daily /backups/weekly /backups/monthly

        echo "[$$(date '+%F %T')] backup start → $$OUT"
        pg_dump --no-owner --no-acl --clean --if-exists | gzip -9 > "$$OUT.tmp"
        mv "$$OUT.tmp" "$$OUT"
        SIZE=$$(du -h "$$OUT" | cut -f1)
        echo "[$$(date '+%F %T')] backup done — $$SIZE"

        if [ "$$DOW" = "7" ]; then
          cp "$$OUT" "/backups/weekly/trading_commercial-week-$${TS}.sql.gz"
        fi
        if [ "$$DOM" = "01" ]; then
          cp "$$OUT" "/backups/monthly/trading_commercial-month-$${TS}.sql.gz"
        fi

        find /backups/daily   -name '*.sql.gz' -mtime +$${BACKUP_RETENTION_DAILY:-7}     -delete
        find /backups/weekly  -name '*.sql.gz' -mtime +$$(( $${BACKUP_RETENTION_WEEKLY:-4} * 7))  -delete
        find /backups/monthly -name '*.sql.gz' -mtime +$$(( $${BACKUP_RETENTION_MONTHLY:-12} * 31)) -delete

        echo "[$$(date '+%F %T')] retention pruned"
        BACKUP
        chmod +x /usr/local/bin/do-backup.sh

        echo "[$$(date '+%F %T')] db-backup ready, scheduled hour=$${BACKUP_HOUR:-2} Asia/Jakarta"
        while true; do
          NOW_HOUR=$$(date +%H)
          NOW_MIN=$$(date +%M)
          if [ "$$NOW_HOUR" = "$$(printf '%02d' $${BACKUP_HOUR:-2})" ] && [ "$$NOW_MIN" = "00" ]; then
            /usr/local/bin/do-backup.sh || echo "[$$(date '+%F %T')] backup FAILED, will retry tomorrow"
            sleep 70
          fi
          sleep 30
        done
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================
  # Cloudflare R2 backup sync — offsite disaster recovery
  # ============================================================
  # Sync ./data/backups + ./public ke R2 bucket (Cloudflare object storage,
  # S3-compatible, free tier 10 GB).
  #
  # Trigger:
  #   - 03:00 Asia/Jakarta — sync /local/backups → r2://bucket/backups/
  #     (1 jam setelah db-backup local jam 02:00)
  #   - Sunday 04:00 — sync /local/public → r2://bucket/public/
  #
  # Setup R2 (one-time, via Cloudflare dashboard):
  #   1. Login dash.cloudflare.com → R2 → Create bucket: babahalgo-backups
  #   2. R2 → Manage R2 API Tokens → Create API token:
  #      - Permissions: Object Read & Write
  #      - Specify bucket: babahalgo-backups
  #      - TTL: 1 year (renew before expiry)
  #   3. Catat: Access Key ID + Secret Access Key + Account ID
  #   4. Set env di .env:
  #      R2_ENABLED=true
  #      R2_ACCOUNT_ID=<account-id>
  #      R2_ACCESS_KEY_ID=<access-key>
  #      R2_SECRET_ACCESS_KEY=<secret>
  #      R2_BUCKET=babahalgo-backups
  #
  # Restore dari R2 (manual, saat disaster):
  #   docker compose -f docker-compose.prod.yml exec r2-backup \
  #     rclone copy r2:babahalgo-backups/backups/daily/<file>.sql.gz /local/backups/daily/
  #   gunzip -c /opt/trading-commercial/data/backups/daily/<file>.sql.gz | \
  #     docker compose exec -T db-backup psql -d trading_commercial
  r2-backup:
    image: rclone/rclone:latest
    container_name: trading-commercial-r2-backup
    restart: unless-stopped
    environment:
      - TZ=Asia/Jakarta
      - R2_ENABLED=${R2_ENABLED:-false}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${R2_BUCKET:-babahalgo-backups}
      - BACKUP_SYNC_HOUR=${BACKUP_SYNC_HOUR:-3}
      - PUBLIC_SYNC_HOUR=${PUBLIC_SYNC_HOUR:-4}
      - PUBLIC_SYNC_DOW=${PUBLIC_SYNC_DOW:-7}
      # rclone S3 config via env (no config file needed)
      - RCLONE_CONFIG_R2_TYPE=s3
      - RCLONE_CONFIG_R2_PROVIDER=Cloudflare
      - RCLONE_CONFIG_R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - RCLONE_CONFIG_R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - RCLONE_CONFIG_R2_REGION=auto
      # Endpoint precedence: explicit R2_ENDPOINT > constructed default (US)
      # Untuk EU jurisdiction set R2_ENDPOINT=https://<account-id>.eu.r2.cloudflarestorage.com
      - RCLONE_CONFIG_R2_ENDPOINT=${R2_ENDPOINT:-https://${R2_ACCOUNT_ID:-account-id}.r2.cloudflarestorage.com}
      - RCLONE_CONFIG_R2_NO_CHECK_BUCKET=true
    volumes:
      - ./data/backups:/local/backups:ro
      - ./public:/local/public:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu

        # ============ do-r2-sync.sh (inline) ============
        cat > /usr/local/bin/do-r2-sync.sh <<'SYNC'
        #!/bin/sh
        # $1 = "backups" atau "public" (subset to sync)
        set -eu
        SUBSET="$$1"
        if [ "$${R2_ENABLED:-false}" != "true" ]; then
          echo "[$$(date '+%F %T')] R2 disabled (R2_ENABLED!=true), skip $$SUBSET sync"
          return 0
        fi
        if [ -z "$${R2_BUCKET:-}" ] || [ -z "$${R2_ACCOUNT_ID:-}" ]; then
          echo "[$$(date '+%F %T')] R2 config incomplete, skip $$SUBSET sync"
          return 1
        fi

        SRC="/local/$$SUBSET"
        DST="r2:$${R2_BUCKET}/$$SUBSET"

        echo "[$$(date '+%F %T')] R2 sync start: $$SRC → $$DST"
        rclone sync --progress --stats=30s --transfers=4 --checkers=8 \
          --retries=3 --low-level-retries=10 \
          "$$SRC" "$$DST" 2>&1 | tail -50

        echo "[$$(date '+%F %T')] R2 sync done: $$SUBSET"
        # Stats (size + count remote)
        rclone size "$$DST" 2>&1 | head -5
        SYNC
        chmod +x /usr/local/bin/do-r2-sync.sh

        # ============ scheduler loop ============
        echo "[$$(date '+%F %T')] r2-backup ready (R2_ENABLED=$${R2_ENABLED:-false}, bucket=$${R2_BUCKET:-?})"
        echo "  - daily backups sync at hour=$${BACKUP_SYNC_HOUR:-3} Asia/Jakarta"
        echo "  - weekly public sync at hour=$${PUBLIC_SYNC_HOUR:-4} on day-of-week=$${PUBLIC_SYNC_DOW:-7} (Sunday)"

        while true; do
          NOW_HOUR=$$(date +%H)
          NOW_MIN=$$(date +%M)
          NOW_DOW=$$(date +%u)

          # Daily backups sync
          if [ "$$NOW_HOUR" = "$$(printf '%02d' $${BACKUP_SYNC_HOUR:-3})" ] && [ "$$NOW_MIN" = "00" ]; then
            /usr/local/bin/do-r2-sync.sh backups || echo "[$$(date '+%F %T')] backups sync FAILED"
            sleep 70
          fi

          # Weekly public sync (Sunday default)
          if [ "$$NOW_DOW" = "$${PUBLIC_SYNC_DOW:-7}" ] && \
             [ "$$NOW_HOUR" = "$$(printf '%02d' $${PUBLIC_SYNC_HOUR:-4})" ] && \
             [ "$$NOW_MIN" = "00" ]; then
            /usr/local/bin/do-r2-sync.sh public || echo "[$$(date '+%F %T')] public sync FAILED"
            sleep 70
          fi

          sleep 30
        done
    depends_on:
      db-backup:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
