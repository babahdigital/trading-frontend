services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://trading_user:${DB_PASSWORD}@host.docker.internal:5432/trading_commercial?schema=public
      - JWT_SECRET=${JWT_SECRET}
      - LICENSE_MW_MASTER_KEY=${LICENSE_MW_MASTER_KEY:?LICENSE_MW_MASTER_KEY must be set in .env}
      - VPS1_BACKEND_URL=${VPS1_BACKEND_URL:?VPS1_BACKEND_URL must be set in .env}
      - VPS1_ADMIN_TOKEN=${VPS1_ADMIN_TOKEN:-}
      - VPS1_TOKEN_SIGNALS=${VPS1_TOKEN_SIGNALS:-}
      - VPS1_TOKEN_TRADE_EVENTS=${VPS1_TOKEN_TRADE_EVENTS:-}
      - VPS1_TOKEN_RESEARCH=${VPS1_TOKEN_RESEARCH:-}
      - VPS1_TOKEN_PAMM=${VPS1_TOKEN_PAMM:-}
      - VPS1_TOKEN_STATS=${VPS1_TOKEN_STATS:-}
      - CRON_SECRET=${CRON_SECRET:-}
      - ENABLE_SIGNAL_CONSUMER=${ENABLE_SIGNAL_CONSUMER:-false}
      - ENABLE_TRADE_EVENTS_CONSUMER=${ENABLE_TRADE_EVENTS_CONSUMER:-false}
      - ENABLE_RESEARCH_INGESTER=${ENABLE_RESEARCH_INGESTER:-false}
      - GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${APP_URL:-https://babahalgo.com}
      # Telegram
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_ADMIN_CHAT_ID=${TELEGRAM_ADMIN_CHAT_ID:-}
      # Email SMTP
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-BabahAlgo <no-reply@babahalgo.com>}
      # Payment — Midtrans
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY:-}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY:-}
      # Payment — Xendit
      - XENDIT_SECRET_KEY=${XENDIT_SECRET_KEY:-}
      - XENDIT_WEBHOOK_TOKEN=${XENDIT_WEBHOOK_TOKEN:-}
      # Observability — Sentry
      - SENTRY_DSN=${SENTRY_DSN:-}
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ORG=${SENTRY_ORG:-}
      - SENTRY_PROJECT=${SENTRY_PROJECT:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
